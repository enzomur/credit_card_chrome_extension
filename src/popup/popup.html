<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CardCompare</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <header class="popup-header">
      <h1>CardCompare</h1>
      <button id="open-options" class="icon-btn" title="Settings">&#9881;</button>
    </header>

    <main class="popup-main">
      <!-- AI Chat Section -->
      <div id="ai-section" class="ai-section">
        <div id="chat-messages" class="chat-messages">
          <div class="ai-welcome">
            <p>Ask me anything about your cards:</p>
            <div class="quick-prompts">
              <button class="quick-prompt" data-prompt="Which card should I use for dining?">Best for dining?</button>
              <button class="quick-prompt" data-prompt="Which card should I use for groceries?">Best for groceries?</button>
              <button class="quick-prompt" data-prompt="Analyze my card portfolio and suggest improvements">Analyze portfolio</button>
            </div>
          </div>
        </div>
        <div class="chat-input-container">
          <input type="text" id="chat-input" placeholder="e.g., Best card for a $500 flight to Miami?" autocomplete="off">
          <button id="send-btn" class="send-btn">
            <span>&#10148;</span>
          </button>
        </div>
      </div>

      <!-- No API Key State -->
      <div id="no-api-key" class="no-api-key hidden">
        <p>Connect your Anthropic API key to get AI-powered recommendations.</p>
        <button id="setup-api-key" class="btn-primary">Set Up API Key</button>
      </div>

      <!-- No Cards State -->
      <div id="empty-state" class="empty-state hidden">
        <p>Add your credit cards to get started.</p>
        <button id="add-first-card" class="btn-primary">Add Your First Card</button>
      </div>
    </main>

    <footer class="popup-footer">
      <span id="card-count">0 cards</span>
      <button id="view-cards" class="btn-link">View Cards</button>
    </footer>
  </div>
  <script type="module" src="popup.ts"></script>
</body>
</html>
